{% extends 'app/base.html' %}
{% load static %}

{% block main_content %}
<div class="container my-4">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                Chat with {{ chat.seller.username if request.user == chat.customer else chat.customer.username }}
            </h5>
        </div>
        <div class="card-body chat-messages" id="chat-messages" style="height: 400px; overflow-y: auto;">
            {% for message in messages %}
                <div class="message {% if message.sender == request.user %}text-end{% endif %} mb-3">
                    <div class="d-inline-block {% if message.sender == request.user %}bg-primary text-white{% else %}bg-light{% endif %} rounded p-2">
                        {{ message.content }}
                    </div>
                    <small class="text-muted d-block">{{ message.timestamp|date:"g:i A" }}</small>
                </div>
            {% endfor %}
        </div>
        <div class="card-footer">
            <form id="chat-form" class="d-flex gap-2">
                <input type="text" id="chat-message-input" class="form-control" placeholder="Type your message...">
                <button type="submit" class="btn btn-primary">Send</button>
            </form>
        </div>
    </div>
</div>

<script>
    const roomName = "{{ chat.name }}";
    const chatSocket = new WebSocket(
        'ws://' + window.location.host.split(':')[0] + ':8001/ws/chat/' + roomName + '/'
    );

    const messagesDiv = document.getElementById('chat-messages');
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${data.sender === "{{ request.user.username }}" ? "text-end" : ""} mb-3`;
        messageDiv.innerHTML = `
            <div class="d-inline-block ${data.sender === "{{ request.user.username }}" ? "bg-primary text-white" : "bg-light"} rounded p-2">
                ${data.content}
            </div>
            <small class="text-muted d-block">${data.timestamp}</small>
        `;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    };

    document.getElementById('chat-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const messageInput = document.getElementById('chat-message-input');
        const message = messageInput.value.trim();
        
        if (message && chatSocket.readyState === WebSocket.OPEN) {
            chatSocket.send(JSON.stringify({
                'message': message
            }));
            messageInput.value = '';
        }
    });
</script>

<style>
    .chat-messages {
        scrollbar-width: thin;
        scrollbar-color: rgba(0,0,0,.2) transparent;
    }

    .chat-messages::-webkit-scrollbar {
        width: 6px;
    }

    .chat-messages::-webkit-scrollbar-track {
        background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
        background-color: rgba(0,0,0,.2);
        border-radius: 3px;
    }

    .message {
        max-width: 80%;
        word-wrap: break-word;
    }

    .message.text-end {
        margin-left: auto;
    }
</style>
{% endblock %}
